<!DOCTYPE html>
<html>
	
	<head>

		<title>AI</title>
		
		<link rel="icon" type="image/x-icon" href="/_/main.ico">
		<link rel="stylesheet" href="/_/main.css">
		<link rel="stylesheet" href="style.css">

	</head>	

	<body>

		<a class="back" id="back" href="..">{Back}</a>

		<a class="title" id="title">{Title}</a>

        <span id="imageSpan"></span>
        
        <hr class="hide">

        <span>
            <button class="smalloption" onclick="setmodel()">Change Model</button>
            <button class="smalloption" onclick="share()">Share Result</button>
        </span>

        <textarea class="input" maxlength="200" id="prompt" placeholder="Type Here"></textarea>
        
        <hr class="hide">

        <button class="option" style="width:60vw;" onclick="run()">Generate</button>

        <hr class="hide">
        
        <textarea class="response" id="response" readonly></textarea>

        <hr class="hide">
	</body>

	<script src="/_/main.js"></script>
	<script src="script.js"></script>

</html>
