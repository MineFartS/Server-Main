<!DOCTYPE html>
<html>
	
	<head>

		<title>Videos</title>
		
		<link rel="icon" type="image/x-icon" href="/_/main.ico">
        <link rel="stylesheet" href="/_/main.css">

	</head>	

    <style>

        hr {
            width: 100%
        }

    </style>

	<body>

		<a class="back" id="back" href=".">{Back}</a>

		<a class="title" id="title">{Title}</a>

		<form method="POST" enctype="multipart/form-data">

            <input 
                class = "hide"
                type = "text" 
                name = "username"
            >

            <input 
                class = "hide"
                type = "text" 
                name = "token"
            >

            <hr>

            <label>Title*</label>
            <br>
            <input 
                class = "form"
                type = "text" 
                name = "Title" 
                required
            >

            <hr> 
            <label>Description</label>
            <br>
            <input
                class = "form"
                type = "text" 
                name = "Description"
            >

            <hr>

            <label>Video*</label>
            <br>
            <input 
                class = "form"
                type = "file" 
                name = "Video" 
                accept = "video/*"
            >

            <hr>

            <label>Thumbnail</label>
            <br>
            <input 
                class = "form"
                type = "file" 
                name = "Thumbnail" 
                accept = "image/*"
            >

            <hr>
            
            <input 
                class = "form"
                type = "submit" 
                value = "Upload"
            >
        
        </form>

	</body>

	<script src="/_/main.js"></script>

    <script>

        authorize()

        e['form'] = document.forms[0];
        e['username'] = document.getElementsByName('username')[0];
        e['token'] = document.getElementsByName('token')[0];

        e.form.action = `${API.url}/Apps/Videos/Upload`;

        e.username.value = cookies.username
        e.token.value = cookies.token

    </script>

</html>
