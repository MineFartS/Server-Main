<!DOCTYPE html>
<html>

	<head>

		<title>Bookmark</title>
		
		<link rel="icon" type="image/x-icon" href="/_/main.ico">
		<link rel="stylesheet" href="/_/main.css">

        <link rel="stylesheet" href="style.css">

	</head>

	<body>

		<a class="back" id="back" href="..">{Back}</a>

		<a class="title" id="title">{Title}</a>

		<input 
			type = "text"
			maxlength = "100"
			id = "0"
			placeholder = "Book Name"
			
            onload   = "data.read(this)"
            onchange = "data.save(this)"
		/>

		<br>

		<input 
			type = "text"
			maxlength = "100"
			id = "1"
			placeholder = "Page #"

            onload   = "data.read(this)"
			onchange = "data.save(this)"
		/>

	</body>

	<script src="/_/main.js"></script>

    <script src="script.js"></script>

</html>
