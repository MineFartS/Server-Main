
services:

  photoprism:
  
    image: photoprism/photoprism:latest
  
    depends_on:
      - mariadb
    
    environment:
      PHOTOPRISM_ADMIN_PASSWORD: "YourSecurePassword"
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "mariadb:3306"
      PHOTOPRISM_DATABASE_NAME: "photoprism"
      PHOTOPRISM_DATABASE_USER: "photoprism"
      PHOTOPRISM_DATABASE_PASSWORD: "YourDatabasePassword"
    
    volumes:
      - "E:/Users/PhotoPrism/originals:/photoprism/originals" # Originals
      - "E:/Users/PhotoPrism/data:/photoprism/storage" # Storage
    
    ports:
      - "2342:2342"
    
    restart: unless-stopped

  mariadb:
    
    image: mariadb:10.11
    
    command: [
        "--innodb-flush-method=O_DSYNC",
         "--innodb-buffer-pool-size=512M",
         "--character-set-server=utf8mb4",
         "--collation-server=utf8mb4_unicode_ci",
         "--aria-sync-log-dir=0"
    ]

    environment:
      MYSQL_ROOT_PASSWORD: "YourDatabasePassword"
      MYSQL_DATABASE: "photoprism"
      MYSQL_USER: "photoprism"
      MYSQL_PASSWORD: "YourDatabasePassword"
    
    volumes:
      - "E:/Users/PhotoPrism/mysql:/var/lib/mysql" # Database
    
    restart: unless-stopped
